<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
  <defs>
    <radialGradient id="wg" cx="35%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0cab8"/>
    </radialGradient>
  </defs>
  <!-- base -->
  <rect x="9" y="36" width="27" height="5" rx="2.5" fill="url(#wg)" stroke="#3d3020" stroke-width="1.5"/>
  <!-- body -->
  <rect x="12" y="18" width="21" height="19" rx="1" fill="url(#wg)" stroke="#3d3020" stroke-width="1.5"/>
  <!-- battlements -->
  <rect x="9"  y="10" width="7"  height="10" rx="1.5" fill="url(#wg)" stroke="#3d3020" stroke-width="1.5"/>
  <rect x="19" y="10" width="7"  height="10" rx="1.5" fill="url(#wg)" stroke="#3d3020" stroke-width="1.5"/>
  <rect x="29" y="10" width="7"  height="10" rx="1.5" fill="url(#wg)" stroke="#3d3020" stroke-width="1.5"/>
  <!-- gap covers to blend battlements into body -->
  <rect x="12" y="18" width="21" height="3" fill="url(#wg)" stroke="none"/>
</svg>
