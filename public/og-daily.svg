<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Daily Pocket Shuffle Chess challenge</title>
  <desc id="desc">A share card inviting players to beat today's tactical seed.</desc>
  <rect width="1200" height="630" fill="#c8e4d7"/>
  <rect x="64" y="64" width="1072" height="502" rx="58" fill="#fff8e9"/>
  <text x="96" y="145" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="900" fill="#7bb2a4" letter-spacing="4">DAILY SHUFFLE CHESS</text>
  <text x="96" y="250" font-family="Inter,Arial,sans-serif" font-size="82" font-weight="950" fill="#2d2b28">Can you beat</text>
  <text x="96" y="338" font-family="Inter,Arial,sans-serif" font-size="82" font-weight="950" fill="#2d2b28">today’s seed?</text>
  <text x="96" y="420" font-family="Inter,Arial,sans-serif" font-size="35" font-weight="850" fill="#776f63">Same 5x6 mirrored setup for everyone.</text>
  <rect x="96" y="460" width="340" height="66" rx="22" fill="#f7cf72"/>
  <text x="126" y="504" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="950" fill="#2d2b28">Daily tactical chess</text>
  <g transform="translate(760 120)"><circle cx="130" cy="130" r="130" fill="#ffa995"/><text x="130" y="160" font-family="Georgia,serif" font-size="190" text-anchor="middle" fill="#fff8e9">♞</text><text x="130" y="315" font-family="Inter,Arial,sans-serif" font-size="38" font-weight="950" text-anchor="middle" fill="#2d2b28">SEED</text><text x="130" y="365" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="950" text-anchor="middle" fill="#2d2b28">QBKNR</text></g>
</svg>
